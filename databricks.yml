bundle:
  name: partssource-unified

variables:
  catalog:
    description: Unity Catalog for PartsSource demo data.
    default: partssource_demo
  workspace_user:
    description: Owner for created assets (auto-detected from deploy context).
    default: ${workspace.current_user.userName}
  warehouse_name:
    description: Serverless SQL warehouse name used by dashboard + metric views.
    default: partssource-demo-wh
  vs_endpoint:
    description: Vector Search endpoint name for the parts catalog index.
    default: partssource-vs-endpoint

include:
  - resources/*.yml

# Deploy picks up the workspace host from DATABRICKS_HOST, --profile, or the
# in-workspace bundle runner. No hardcoded host here.
targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: partssource_demo

  demo:
    mode: production
    variables:
      catalog: partssource_demo
