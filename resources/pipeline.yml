resources:
  pipelines:
    partssource_medallion:
      name: partssource-medallion-${bundle.target}
      catalog: ${var.catalog}
      schema: pipeline
      serverless: true
      channel: PREVIEW
      photon: true
      libraries:
        - file:
            path: ../src/pipeline/bronze.py
        - file:
            path: ../src/pipeline/silver.py
        - file:
            path: ../src/pipeline/gold.py
      configuration:
        ps.catalog: ${var.catalog}
      continuous: false
      edition: ADVANCED
      # Single target schema. Tables use prefixed names (bronze_*, silver_*, gold_*)
      # because UC pipelines require one target schema. Metric views live in a separate
      # `gold` schema, created out-of-band by build_metric_views task.
